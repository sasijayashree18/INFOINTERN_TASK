<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Professional Login Form</title>

<style>

*{

margin:0;

padding:0;

box-sizing:border-box;

font-family:'Segoe UI',sans-serif;

}

body{

background:linear-gradient(-45deg,#667eea,#764ba2,#6dd5ed,#2193b0);

background-size:400% 400%;

animation:bgAnimation 12s ease infinite;

min-height:100vh;

}

@keyframes bgAnimation{

0%{background-position:0% 50%;}

50%{background-position:100% 50%;}

100%{background-position:0% 50%;}

}

/* Navigation */

nav{

display:flex;

justify-content:space-between;

align-items:center;

padding:18px 40px;

background:rgba(255,255,255,.15);

backdrop-filter:blur(12px);

}

.logo{

font-size:30px;

font-weight:bold;

color:white;

}

nav ul{

display:flex;

list-style:none;

}

nav ul li{

margin-left:25px;

}

nav ul li a{

color:white;

text-decoration:none;

font-size:17px;

font-weight:bold;

transition:.3s;

}

nav ul li a:hover{

color:#FFD700;

}

/* Login Card */

.container{

width:420px;

margin:60px auto;

background:rgba(255,255,255,.20);

backdrop-filter:blur(20px);

padding:35px;

border-radius:25px;

box-shadow:0 15px 35px rgba(0,0,0,.3);

color:white;

}

.container h2{

text-align:center;

margin-bottom:25px;

font-size:32px;

}

.input-group{

margin-bottom:20px;

}

.input-group label{

display:block;

margin-bottom:8px;

font-weight:bold;

}

.input-group input{

width:100%;

padding:12px;

border:none;

border-radius:10px;

font-size:16px;

outline:none;

}

button{

width:100%;

padding:13px;

border:none;

border-radius:10px;

font-size:17px;

font-weight:bold;

cursor:pointer;

transition:.3s;

margin-top:12px;

}

.login{

background:#FFD700;

color:#003366;

}

.login:hover{

background:white;

transform:scale(1.05);

}

.reset{

background:#FF6B6B;

color:white;

}

.reset:hover{

background:#E74C3C;

transform:scale(1.05);

}

.show{

margin-top:10px;

display:flex;

align-items:center;

gap:10px;

}

.error{

color:#FFD700;

font-size:14px;

margin-top:5px;

}

footer{

text-align:center;

color:white;

padding:20px;

}

@media(max-width:500px){

.container{

width:90%;

}

nav{

flex-direction:column;

}

nav ul{

margin-top:15px;

flex-wrap:wrap;

justify-content:center;

}

}

</style>

</head>

<body>

<nav>

<div class="logo">

🔐 Login Portal

</div>

<ul>

<li><a href="#">Home</a></li>

<li><a href="#">Services</a></li>

<li><a href="#">About</a></li>

<li><a href="#">Contact</a></li>

</ul>

</nav>

<div class="container">

<h2>Welcome Back</h2>
<div class="input-group">

<label>👤 Username</label>

<input type="text"
id="username"
placeholder="Enter your username">

<div class="error" id="userError"></div>

</div>

<div class="input-group">

<label>🔒 Password</label>

<input type="password"
id="password"
placeholder="Enter your password">

<div class="error" id="passError"></div>

</div>

<div class="show">

<input type="checkbox"
id="showPassword"
onclick="togglePassword()">

<label for="showPassword">
👁️ Show Password
</label>

</div>

<button class="login"
onclick="loginUser()">

🚪 Login

</button>

<button class="reset"
onclick="resetForm()">

🔄 Reset

</button>

<br><br>

<p style="text-align:center;">

Forgot Password?

<a href="#"
style="color:#FFD700; text-decoration:none;">

Click Here

</a>

</p>

<br>

<p style="text-align:center;">

Don't have an account?

<a href="#"
style="color:#FFD700; text-decoration:none;">

Sign Up

</a>

</p>
</div>

<footer>

© 2026 Professional Login Form

</footer>

<script>

/* Show / Hide Password */

function togglePassword(){

let password=document.getElementById("password");

if(password.type==="password"){

password.type="text";

}

else{

password.type="password";

}

}

/* Login Validation */

function loginUser(){

let username=document.getElementById("username").value.trim();

let password=document.getElementById("password").value.trim();

document.getElementById("userError").innerHTML="";

document.getElementById("passError").innerHTML="";

/* Username Validation */

if(username==""){

document.getElementById("userError").innerHTML="⚠ Please enter your username.";

return;

}

/* Password Validation */

if(password==""){

document.getElementById("passError").innerHTML="⚠ Please enter your password.";

return;

}

if(password.length<6){

document.getElementById("passError").innerHTML="⚠ Password must contain at least 6 characters.";

return;

}

/* Login Success */

alert("✅ Login Successful!\n\nWelcome " + username + " 🎉");

}

/* Reset Form */

function resetForm(){

document.getElementById("username").value="";

document.getElementById("password").value="";

document.getElementById("userError").innerHTML="";

document.getElementById("passError").innerHTML="";

document.getElementById("showPassword").checked=false;

document.getElementById("password").type="password";

alert("🔄 Form Reset Successfully!");

}

</script>

</body>

</html>
<script>

/* Navigation Button Actions */

document.querySelectorAll("nav a").forEach(link=>{

link.addEventListener("click",function(event){

event.preventDefault();

let page=this.innerHTML;

alert("📄 Opening "+page+" Page");

});

});

/* Welcome Message */

window.onload=function(){

setTimeout(function(){

alert("👋 Welcome to the Professional Login Portal!");

},500);

};

/* Theme Changer */

let darkMode=false;

function changeTheme(){

if(!darkMode){

document.body.style.background="linear-gradient(135deg,#141E30,#243B55)";

document.querySelector(".container").style.background="rgba(255,255,255,0.15)";

darkMode=true;

}

else{

document.body.style.background="linear-gradient(-45deg,#667eea,#764ba2,#6dd5ed,#2193b0)";

document.body.style.backgroundSize="400% 400%";

document.querySelector(".container").style.background="rgba(255,255,255,.20)";

darkMode=false;

}

}

</script>

<div style="text-align:center;margin-bottom:20px;">

<button onclick="changeTheme()">

🌙 Change Theme

</button>

</div>

<footer>

<h3>🔐 Professional Login Portal</h3>

<p>Designed by <b>Jayashree S</b></p>

<p>© 2026 All Rights Reserved</p>

</footer>

</body>

</html>
